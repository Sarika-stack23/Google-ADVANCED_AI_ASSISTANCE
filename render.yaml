services:
  - type: web
    name: agentic-math-solver-api
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "uvicorn backend.src.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: USE_GEMINI
        value: "true"
      - key: USE_FIREBASE
        value: "true"
      - key: FIREBASE_CREDENTIALS_PATH
        sync: false
      - key: ENVIRONMENT
        value: "production"
